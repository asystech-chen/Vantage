<script src="chrome://browser/content/preferences/librewolf.js"/>

<html:template id="template-paneLibrewolf">

<hbox class="subcategory" hidden="true" data-category="paneLibrewolf">
  <html:h1 data-l10n-id="librewolf-header"/>
</hbox>

<!-- ===== VANTAGE CUSTOM: Update Check ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="vantage-update-heading" />

  <hbox>
    <checkbox id="vantage-update-checkbox" data-l10n-id="vantage-update-checkbox" setting="vantageUpdateCheck" flex="1" />
    <html:label for="vantage-update-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="vantage-update-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="vantage-update-description" />
      <checkbox setting="vantage.updateCheck.enabled" label="vantage.updateCheck.enabled" />
    </vbox>
  </vbox>

</groupbox>

<!-- ===== VANTAGE CUSTOM: AI Sidebar ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="vantage-ai-heading" />

  <hbox>
    <checkbox id="vantage-ai-checkbox" data-l10n-id="vantage-ai-checkbox" setting="vantageAiSidebar" flex="1" />
    <html:label for="vantage-ai-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="vantage-ai-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="vantage-ai-description" />
      <checkbox setting="browser.ml.chat.enabled" label="browser.ml.chat.enabled" />
      <checkbox setting="browser.ai.control.sidebarChatbot" label="browser.ai.control.sidebarChatbot" />
    </vbox>
  </vbox>

</groupbox>

<!-- ===== General Behavior ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="librewolf-general-heading"/>

  <hbox>
    <checkbox id="librewolf-extension-update-checkbox" data-l10n-id="librewolf-extension-update-checkbox" setting="librewolfExtensionUpdate" flex="1" />
    <html:label for="librewolf-extension-update-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-extension-update-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-extension-update-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-extension-update-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="extensions.update.autoUpdateDefault" label="extensions.update.autoUpdateDefault" />
      <checkbox setting="extensions.update.enabled" label="extensions.update.enabled" />
    </vbox>
  </vbox>

  <hbox>
    <checkbox id="librewolf-sync-checkbox" data-l10n-id="librewolf-sync-checkbox" setting="librewolfSync" flex="1" />
    <html:label for="librewolf-sync-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-sync-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-sync-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-sync-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="identity.fxaccounts.enabled" label="identity.fxaccounts.enabled" />
    </vbox>
  </vbox>
  
  <hbox>
    <checkbox id="librewolf-autocopy-checkbox" data-l10n-id="librewolf-autocopy-checkbox" setting="librewolfMiddleClick" flex="1" />
    <html:label for="librewolf-autocopy-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-autocopy-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-autocopy-description" />
      <checkbox setting="clipboard.autocopy" label="clipboard.autocopy" />
      <checkbox setting="middlemouse.paste" label="middlemouse.paste" />
    </vbox>
  </vbox>

  <hbox>
    <checkbox id="librewolf-styling-checkbox" data-l10n-id="librewolf-styling-checkbox" setting="librewolfUserChrome" flex="1" />
    <html:label for="librewolf-styling-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-styling-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-styling-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-styling-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="toolkit.legacyUserProfileCustomizations.stylesheets" label="toolkit.legacyUserProfileCustomizations.stylesheets" />
    </vbox>
  </vbox>

</groupbox>

<!-- ===== Networking ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="librewolf-network-heading" />

  <hbox>
    <checkbox id="librewolf-ipv6-checkbox" data-l10n-id="librewolf-ipv6-checkbox" setting="librewolfIPv6" flex="1" />
    <html:label for="librewolf-ipv6-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-ipv6-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-ipv6-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-ipv6-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="network.dns.disableIPv6" label="network.dns.disableIPv6" />
    </vbox>
  </vbox>

</groupbox>

<!-- ===== Privacy ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="librewolf-privacy-heading" />

  <hbox>
    <checkbox id="librewolf-xorigin-ref-checkbox" data-l10n-id="librewolf-xorigin-ref-checkbox" setting="librewolfCrossOrigin" flex="1" />
    <html:label for="librewolf-xorigin-ref-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-xorigin-ref-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-xorigin-ref-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-xorigin-ref-warning1" class="librewolf-warning" /> </html:div>
      <checkbox disabled="true" setting="network.http.referer.XOriginPolicy" label="network.http.referer.XOriginPolicy" />
    </vbox>
  </vbox>

</groupbox>

<!-- ===== Fingerprinting ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="librewolf-broken-heading" />

  <hbox>
    <checkbox id="librewolf-rfp-checkbox" data-l10n-id="librewolf-rfp-checkbox" setting="librewolfRFP" flex="1" />
    <html:label for="librewolf-rfp-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-rfp-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-rfp-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-rfp-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="privacy.resistFingerprinting" label="privacy.resistFingerprinting" />
    </vbox>
  </vbox>

  <vbox class="indent">

    <hbox>
      <checkbox id="librewolf-letterboxing-checkbox" data-l10n-id="librewolf-letterboxing-checkbox" setting="librewolfLetterboxing" flex="1" />
      <html:label for="librewolf-letterboxing-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
    </hbox>
    <vbox class="librewolf-collapse indent">
      <html:input type="checkbox" id="librewolf-letterboxing-collapse" />
      <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
        <label data-l10n-id="librewolf-letterboxing-description" />
        <checkbox setting="privacy.resistFingerprinting.letterboxing" label="privacy.resistFingerprinting.letterboxing" />
      </vbox>
    </vbox>

  </vbox>

  <hbox>
    <checkbox id="librewolf-webgl-checkbox" data-l10n-id="librewolf-webgl-checkbox" setting="librewolfWebGL" flex="1" />
    <html:label for="librewolf-webgl-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-webgl-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-webgl-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-webgl-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="webgl.disabled" label="webgl.disabled" />
    </vbox>
  </vbox>

</groupbox>

<!-- ===== Security ===== -->
<groupbox hidden="true" data-category="paneLibrewolf">
  <html:h2 data-l10n-id="librewolf-security-heading" />

  <hbox>
    <checkbox id="librewolf-goog-safe-checkbox" data-l10n-id="librewolf-goog-safe-checkbox" setting="librewolfSafeBrowsing" flex="1" />
    <html:label for="librewolf-goog-safe-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
  </hbox>
  <vbox class="librewolf-collapse indent">
    <html:input type="checkbox" id="librewolf-goog-safe-collapse" />
    <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
      <label data-l10n-id="librewolf-goog-safe-description" />
      <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-goog-safe-warning1" class="librewolf-warning" /> </html:div>
      <checkbox setting="browser.safebrowsing.malware.enabled" label="browser.safebrowsing.malware.enabled" />
      <checkbox setting="browser.safebrowsing.phishing.enabled" label="browser.safebrowsing.phishing.enabled" />
      <checkbox setting="browser.safebrowsing.blockedURIs.enabled" label="browser.safebrowsing.blockedURIs.enabled" />
      <checkbox setting="browser.safebrowsing.provider.google4.gethashURL" label="browser.safebrowsing.provider.google4.gethashURL" />
      <checkbox setting="browser.safebrowsing.provider.google4.updateURL" label="browser.safebrowsing.provider.google4.updateURL" />
      <checkbox setting="browser.safebrowsing.provider.google.gethashURL" label="browser.safebrowsing.provider.google.gethashURL" />
      <checkbox setting="browser.safebrowsing.provider.google.updateURL" label="browser.safebrowsing.provider.google.updateURL" />
    </vbox>
  </vbox>

  <vbox class="indent">
    <hbox>
      <checkbox id="librewolf-goog-safe-download-checkbox" data-l10n-id="librewolf-goog-safe-download-checkbox" setting="librewolfSafeBrowsingDownloads" flex="1" />
      <html:label for="librewolf-goog-safe-download-collapse" class="sidebar-footer-link" pack="end"> <image class="sidebar-footer-icon help-icon"/> </html:label>
    </hbox>
    <vbox class="librewolf-collapse indent">
      <html:input type="checkbox" id="librewolf-goog-safe-download-collapse" />
      <vbox class="librewolf-collapsed tracking-protection-ui content-blocking-category">
        <label data-l10n-id="librewolf-goog-safe-download-description" />
        <html:div> <image src="chrome://browser/skin/warning.svg" /> <label data-l10n-id="librewolf-goog-safe-download-warning1" class="librewolf-warning" /> </html:div>
        <checkbox setting="browser.safebrowsing.downloads.enabled" label="browser.safebrowsing.downloads.enabled" />
      </vbox>
    </vbox>
  </vbox>

</groupbox>

<hbox class="subcategory" hidden="true" data-category="paneLibrewolf">
    <html:h1 data-l10n-id="librewolf-footer"/>
</hbox>

<groupbox data-category="paneLibrewolf" hidden="true">
  <vbox class="sidebar-footer-list">
    <hbox>
      <html:a class="sidebar-footer-link" href="about:config" target="_blank" style="margin-inline-end: 24px;">
        <image class="sidebar-footer-icon" src="chrome://browser/skin/preferences/category-general.svg"/>
        <label class="sidebar-footer-label" data-l10n-id="librewolf-config-link"/>
      </html:a>
      <html:a class="sidebar-footer-link" href="about:support" target="_blank">
        <image class="sidebar-footer-icon" src="chrome://browser/skin/open.svg"/>
        <label class="sidebar-footer-label" data-l10n-id="librewolf-open-profile"/>
      </html:a>
      <html:a class="sidebar-footer-link" href="about:debugging" target="_blank">
        <image class="sidebar-footer-icon" src="chrome://devtools/skin/images/settings.svg"/>
        <label class="sidebar-footer-label" data-l10n-id="librewolf-debug"/>
      </html:a>
    </hbox>
  </vbox>
</groupbox>

</html:template>
