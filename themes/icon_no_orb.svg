<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="512"
   height="512"
   viewBox="0 0 600 600"
   version="1.1"
   id="svg16"
   sodipodi:docname="icon_no_orb.svg"
   inkscape:version="1.4.3 (0d15f75, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/">
  <title
     id="title1">Vantage Browser Logo</title>
  <desc
     id="desc1">Vantage Orb Logo - 512x512 - Inkscape Compatible</desc>
  <defs
     id="defs">
    <!-- V 形渐变（蓝→青） -->
    <linearGradient
       id="vGrad"
       x1="210"
       y1="210"
       x2="390"
       y2="420"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         style="stop-color:#3B82F6;stop-opacity:1"
         id="stop1" />
      <stop
         offset="0.4"
         style="stop-color:#2563EB;stop-opacity:1"
         id="stop2" />
      <stop
         offset="0.7"
         style="stop-color:#2DD4BF;stop-opacity:1"
         id="stop3" />
      <stop
         offset="1"
         style="stop-color:#14B8A6;stop-opacity:1"
         id="stop4" />
    </linearGradient>
    <!-- V 形左侧高光渐变 -->
    <linearGradient
       id="vHighlight"
       x1="180"
       y1="200"
       x2="240"
       y2="260"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         style="stop-color:#FFFFFF;stop-opacity:0.6"
         id="stop5" />
      <stop
         offset="0.5"
         style="stop-color:#FFFFFF;stop-opacity:0.2"
         id="stop6" />
      <stop
         offset="1"
         style="stop-color:#FFFFFF;stop-opacity:0"
         id="stop7" />
    </linearGradient>
    <!-- V 形右侧高光渐变 -->
    <linearGradient
       id="vHighlightRight"
       x1="420"
       y1="200"
       x2="360"
       y2="260"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         style="stop-color:#FFFFFF;stop-opacity:0.6"
         id="stop8" />
      <stop
         offset="0.5"
         style="stop-color:#FFFFFF;stop-opacity:0.2"
         id="stop9" />
      <stop
         offset="1"
         style="stop-color:#FFFFFF;stop-opacity:0"
         id="stop10" />
    </linearGradient>
    <!-- 外环渐变 -->
    <linearGradient
       id="ringGrad"
       x1="0"
       y1="0"
       x2="600"
       y2="600"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         style="stop-color:#60A5FA;stop-opacity:1"
         id="stop11" />
      <stop
         offset="1"
         style="stop-color:#2DD4BF;stop-opacity:1"
         id="stop12" />
    </linearGradient>
    <!-- ✅ 全局阴影滤镜 - SVG 1.1 兼容写法 -->
    <filter
       id="globalShadow"
       x="-0.1"
       y="-0.1"
       width="1.2"
       height="1.2166667">
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="20"
         result="blur"
         id="feGaussianBlur12" />
      <feOffset
         in="blur"
         dx="0"
         dy="8"
         result="offsetBlur"
         id="feOffset12" />
      <feFlood
         flood-color="#000000"
         flood-opacity="0.2"
         result="color"
         id="feFlood12" />
      <feComposite
         in="color"
         in2="offsetBlur"
         operator="in"
         result="shadow"
         id="feComposite12" />
      <feMerge
         id="feMerge13">
        <feMergeNode
           in="shadow"
           id="feMergeNode12" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode13" />
      </feMerge>
    </filter>
    <!-- ✅ V 形阴影滤镜 - SVG 1.1 兼容写法 -->
    <filter
       id="vShadow"
       x="-0.246"
       y="-0.25625"
       width="1.492"
       height="1.5374818">
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="10"
         result="blur"
         id="feGaussianBlur13" />
      <feOffset
         in="blur"
         dx="0"
         dy="6"
         result="offsetBlur"
         id="feOffset13" />
      <feFlood
         flood-color="#3B82F6"
         flood-opacity="0.35"
         result="color"
         id="feFlood13" />
      <feComposite
         in="color"
         in2="offsetBlur"
         operator="in"
         result="shadow"
         id="feComposite13" />
      <feMerge
         id="feMerge15">
        <feMergeNode
           in="shadow"
           id="feMergeNode14" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode15" />
      </feMerge>
    </filter>
    <!-- 高光模糊滤镜 -->
    <filter
       id="highlightBlur"
       x="-0.32"
       y="-0.48"
       width="1.64"
       height="1.96">
      <feGaussianBlur
         stdDeviation="8"
         id="feGaussianBlur15" />
    </filter>
    <!-- 顶部光晕滤镜 -->
    <filter
       id="glowBlur"
       x="-0.15"
       y="-0.8"
       width="1.3"
       height="2.6">
      <feGaussianBlur
         stdDeviation="10"
         id="feGaussianBlur16" />
    </filter>
  </defs>
  <sodipodi:namedview
     id="namedview"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:document-units="px"
     showgrid="false"
     inkscape:zoom="1"
     inkscape:cx="256.5"
     inkscape:cy="256"
     inkscape:window-width="2560"
     inkscape:window-height="1385"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg16"
     inkscape:showpageshadow="2"
     inkscape:deskcolor="#d1d1d1" />
  <!-- 全局阴影层 -->
  <!-- 主背景圆 -->
  <!-- 外环边框 -->
  <!-- 内环装饰 -->
  <!-- 主 V 形 -->
  <path
     id="v-shape"
     d="M175 195 L300 435 L425 195"
     stroke="url(#vGrad)"
     stroke-width="75"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none"
     filter="url(#vShadow)" />
  <!-- V 形左侧高光 -->
  <path
     id="v-highlight-left"
     d="M185 205 L275 395"
     stroke="url(#vHighlight)"
     stroke-width="12"
     stroke-linecap="round"
     filter="url(#highlightBlur)"
     opacity="0.8" />
  <!-- V 形右侧高光 -->
  <path
     id="v-highlight-right"
     d="M415 205 L325 395"
     stroke="url(#vHighlightRight)"
     stroke-width="12"
     stroke-linecap="round"
     filter="url(#highlightBlur)"
     opacity="0.8" />
  <!-- V 形底部柔光 -->
  <ellipse
     id="v-bottom-glow"
     cx="300"
     cy="425"
     rx="30"
     ry="20"
     fill="#FFFFFF"
     opacity="0.25"
     filter="url(#highlightBlur)" />
  <!-- 顶部环境光晕 -->
  <ellipse
     id="top-glow"
     cx="300"
     cy="130"
     rx="80"
     ry="15"
     fill="#FFFFFF"
     opacity="0.25"
     filter="url(#glowBlur)" />
  <metadata
     id="metadata16">
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:title>Vantage Browser Logo</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
</svg>
