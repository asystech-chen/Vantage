<svg width="512" height="512" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" version="1.1">
  <title>Vantage Browser Logo</title>
  <desc>Vantage Orb Logo - 512x512</desc>
  
  <defs>
    <linearGradient id="vGrad" x1="210" y1="210" x2="390" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.4" stop-color="#2563EB"/>
      <stop offset="0.7" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    
    <linearGradient id="vHighlight" x1="180" y1="200" x2="240" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#FFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="vHighlightRight" x1="420" y1="200" x2="360" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#FFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="ringGrad" x1="0" y1="0" x2="600" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    
    <filter id="globalShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="vShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur10"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  
  <circle cx="300" cy="308" r="240" fill="#000" opacity="0.12" filter="url(#globalShadow)"/>
  <circle cx="300" cy="300" r="240" fill="#FFF" filter="url(#globalShadow)"/>
  <circle cx="300" cy="300" r="238" stroke="url(#ringGrad)" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="300" cy="300" r="225" stroke="#E2E8F0" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M175 195 L300 435 L425 195" stroke="url(#vGrad)" stroke-width="75" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#vShadow)"/>
  <path d="M185 205 L275 395" stroke="url(#vHighlight)" stroke-width="12" stroke-linecap="round" filter="url(#blur8)" opacity="0.8"/>
  <path d="M415 205 L325 395" stroke="url(#vHighlightRight)" stroke-width="12" stroke-linecap="round" filter="url(#blur8)" opacity="0.8"/>
  <ellipse cx="300" cy="425" rx="30" ry="20" fill="#FFF" opacity="0.25" filter="url(#blur8)"/>
  <ellipse cx="300" cy="130" rx="80" ry="15" fill="#FFF" opacity="0.25" filter="url(#blur10)"/>
</svg>