<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 600 600" 
     xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
     version="1.1">
  
  <title>Vantage Browser Logo</title>
  <desc>Vantage Orb Logo - 512x512 - Inkscape Compatible</desc>
  
  <defs id="defs">
    <!-- V 形渐变（蓝→青） -->
    <linearGradient id="vGrad" x1="210" y1="210" x2="390" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" style="stop-color:#3B82F6;stop-opacity:1"/>
      <stop offset="0.4" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="0.7" style="stop-color:#2DD4BF;stop-opacity:1"/>
      <stop offset="1" style="stop-color:#14B8A6;stop-opacity:1"/>
    </linearGradient>
    
    <!-- V 形左侧高光渐变 -->
    <linearGradient id="vHighlight" x1="180" y1="200" x2="240" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" style="stop-color:#FFFFFF;stop-opacity:0.6"/>
      <stop offset="0.5" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
      <stop offset="1" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    
    <!-- V 形右侧高光渐变 -->
    <linearGradient id="vHighlightRight" x1="420" y1="200" x2="360" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" style="stop-color:#FFFFFF;stop-opacity:0.6"/>
      <stop offset="0.5" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
      <stop offset="1" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    
    <!-- 外环渐变 -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="600" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" style="stop-color:#60A5FA;stop-opacity:1"/>
      <stop offset="1" style="stop-color:#2DD4BF;stop-opacity:1"/>
    </linearGradient>
    
    <!-- ✅ 全局阴影滤镜 - SVG 1.1 兼容写法 -->
    <filter id="globalShadow" x="-0.5" y="-0.5" width="2" height="2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset in="blur" dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- ✅ V 形阴影滤镜 - SVG 1.1 兼容写法 -->
    <filter id="vShadow" x="-0.5" y="-0.5" width="2" height="2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset in="blur" dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 高光模糊滤镜 -->
    <filter id="highlightBlur" x="-0.5" y="-0.5" width="2" height="2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    
    <!-- 顶部光晕滤镜 -->
    <filter id="glowBlur" x="-0.5" y="-0.5" width="2" height="2">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  
  <sodipodi:namedview id="namedview" 
                      pagecolor="#ffffff" 
                      bordercolor="#666666" 
                      borderopacity="1.0"
                      inkscape:pageshadow="2"
                      inkscape:pageopacity="0.0"
                      inkscape:pagecheckerboard="0"
                      inkscape:document-units="px"
                      showgrid="false"
                      inkscape:zoom="1"
                      inkscape:cx="256"
                      inkscape:cy="256"
                      inkscape:window-width="1920"
                      inkscape:window-height="1080"
                      inkscape:window-x="0"
                      inkscape:window-y="0"
                      inkscape:window-maximized="1"
                      inkscape:current-layer="svg"/>
  
  <!-- 全局阴影层 -->
  <circle id="shadow-layer" cx="300" cy="308" r="240" fill="#000000" opacity="0.12" filter="url(#globalShadow)"/>
  
  <!-- 主背景圆 -->
  <circle id="bg-circle" cx="300" cy="300" r="240" fill="#FFFFFF" filter="url(#globalShadow)"/>
  
  <!-- 外环边框 -->
  <circle id="outer-ring" cx="300" cy="300" r="238" stroke="url(#ringGrad)" stroke-width="3" fill="none" opacity="0.4"/>
  
  <!-- 内环装饰 -->
  <circle id="inner-ring" cx="300" cy="300" r="225" stroke="#E2E8F0" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- 主 V 形 -->
  <path id="v-shape" d="M175 195 L300 435 L425 195" 
        stroke="url(#vGrad)" 
        stroke-width="75" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"
        filter="url(#vShadow)"/>
  
  <!-- V 形左侧高光 -->
  <path id="v-highlight-left" d="M185 205 L275 395" 
        stroke="url(#vHighlight)" 
        stroke-width="12" 
        stroke-linecap="round"
        filter="url(#highlightBlur)"
        opacity="0.8"/>
  
  <!-- V 形右侧高光 -->
  <path id="v-highlight-right" d="M415 205 L325 395" 
        stroke="url(#vHighlightRight)" 
        stroke-width="12" 
        stroke-linecap="round"
        filter="url(#highlightBlur)"
        opacity="0.8"/>
  
  <!-- V 形底部柔光 -->
  <ellipse id="v-bottom-glow" cx="300" cy="425" rx="30" ry="20" fill="#FFFFFF" opacity="0.25" filter="url(#highlightBlur)"/>
  
  <!-- 顶部环境光晕 -->
  <ellipse id="top-glow" cx="300" cy="130" rx="80" ry="15" fill="#FFFFFF" opacity="0.25" filter="url(#glowBlur)"/>
  
</svg>