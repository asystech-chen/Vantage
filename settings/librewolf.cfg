/** ------------------------------
 * [CATEGORY] OVERRIDES
 * allow settings to be overriden with a file placed in the right location
 * https://librewolf.net/docs/settings/#where-do-i-find-my-librewolfoverridescfg
 * ------------------------------- */
let profile_directory = null;

let supportsXDG = false;
try { supportsXDG = getPref("widget.support-xdg-config"); } catch (e) { supportsXDG = false; }

if (supportsXDG) {
  let isLegacy = false;
  {
    let Cc = Components.classes;
    let Ci = Components.interfaces;
    let dirSvc = Cc["@mozilla.org/file/directory_service;1"]
                 .getService(Ci.nsIProperties || Ci.nsIDirectoryService);
    let profDir = dirSvc.get("ProfD", Ci.nsIFile);
    let path = profDir.path || "";
    isLegacy = path.includes(".vantage");
  }

  if (!isLegacy) {
    let xdg = getenv("XDG_CONFIG_HOME");
    if (xdg) {
      profile_directory = xdg;
    } else {
      let home = getenv("HOME");
      profile_directory = home ? (home + "/.config") : null;
    }
    if (profile_directory) {
      defaultPref(
        "autoadmin.global_config_url",
        `file://${profile_directory}/vantage/vantage/vantage.overrides.cfg`
      );
    }
  } else {
    if (profile_directory = getenv("HOME")) {
      defaultPref(
        "autoadmin.global_config_url",
        `file://${profile_directory}/.vantage/vantage.overrides.cfg`
      );
    }
  }
} else {
  if ((profile_directory = getenv("USERPROFILE") || getenv("HOME"))) {
      defaultPref(
        "autoadmin.global_config_url",
        `file://${profile_directory}/.vantage/vantage.overrides.cfg`
      );
    }
}

/** ------------------------------- *
 * Vantage 自动更新检查
 *
 * 浏览器启动后后台检查 releases.json，如有新版本在窗口顶部显示通知栏。
 * 每 24 小时最多检查一次，用户关掉通知后不再重复提示同一版本。
 * 可通过 vantage.updateCheck.enabled 设置为 false 关闭。
 * ------------------------------- */

defaultPref("vantage.updateCheck.enabled", true);
defaultPref("vantage.updateCheck.intervalHours", 24);
defaultPref("vantage.updateCheck.lastCheck", 0);
defaultPref("vantage.updateCheck.dismissedVersion", "");

if (Services.prefs.getBoolPref("vantage.updateCheck.enabled", true)) {
  try {
    const { XPCOMUtils } = ChromeUtils.importESModule(
      "resource://gre/modules/XPCOMUtils.sys.mjs"
    );

    const updateCheckObserver = {
      observe(subject, topic, data) {
        if (topic !== "browser-delayed-startup-finished") return;

        const now = Math.floor(Date.now() / 1000);
        const lastCheck = Services.prefs.getIntPref("vantage.updateCheck.lastCheck", 0);
        const intervalSec = Services.prefs.getIntPref("vantage.updateCheck.intervalHours", 24) * 3600;

        if (now - lastCheck < intervalSec) return;

        Services.prefs.setIntPref("vantage.updateCheck.lastCheck", now);

        const apiUrl = Services.prefs.getStringPref(
          "vantage.aboutMenu.versionCheckUrl",
          "https://asystech.cn/vantage/releases.json"
        );
        const downloadPage = Services.prefs.getStringPref(
          "vantage.aboutMenu.downloadPageUrl",
          "https://asystech.cn/pc/vantage.html"
        );

        fetch(apiUrl)
          .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
          .then(data => {
            if (!data || data.length === 0) return;

            const latest = data[0].tag_name;
            const current = Services.appinfo.version; // e.g. "149.0-1"
            const currentTag = "v" + current;
            const dismissedVersion = Services.prefs.getStringPref("vantage.updateCheck.dismissedVersion", "");

            // 版本比较
            function isNewer(newTag, oldTag) {
              let [oldV, oldR] = oldTag.replace(/^v/, "").split("-");
              let [newV, newR] = newTag.replace(/^v/, "").split("-");
              if (!oldR) oldR = "0";
              if (!newR) newR = "0";
              let oP = oldV.split("."), nP = newV.split(".");
              for (let i = 0; i < nP.length; i++) {
                let o = Number(oP[i] || "0"), n = Number(nP[i]);
                if (n > o) return true;
                if (n < o) return false;
              }
              return Number(newR) > Number(oldR);
            }

            if (!isNewer(latest, currentTag)) return;
            if (dismissedVersion === latest) return;

            // 在最前面的浏览器窗口显示通知栏
            const win = subject;
            const notifyBox = win.gNotificationBox;
            if (!notifyBox) return;

            const buttons = [
              {
                label: "前往下载",
                accessKey: "D",
                callback: () => {
                  win.openWebLinkIn(downloadPage, "tab");
                },
              },
              {
                label: "忽略此版本",
                accessKey: "I",
                callback: () => {
                  Services.prefs.setStringPref("vantage.updateCheck.dismissedVersion", latest);
                },
              },
            ];

            const versionName = data[0].name || latest;
            notifyBox.appendNotification(
              "vantage-update-available",
              {
                label: "发现新版本：" + versionName + "。",
                priority: notifyBox.PRIORITY_INFO_LOW,
              },
              buttons
            );
          })
          .catch(err => {
            // 静默失败
            console.warn("Vantage update check failed:", err);
          });
      },
    };

    Services.obs.addObserver(updateCheckObserver, "browser-delayed-startup-finished");
  } catch (e) {
    console.warn("Vantage update check init failed:", e);
  }
}
